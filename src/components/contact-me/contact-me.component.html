<section id="contact-me" class="contact-section">

  <h2 class="section-title">Contact Me</h2>

  <div class="contact-container">

    <div class="contact-text-section">
      <div class="contact-text">
        <p>
          If you have a project in mind, want to know more about my skills,
          or just want to say hi!
          Please fill in this form and I will reply to you shortly.
        </p>
      </div>

      <div class="contact-details-grid">
        <div class="contact-card">
          <span class="icon"><i class="fas fa-phone"></i></span>
          <p>+216 21 824 361</p>
        </div>
        <div class="contact-card">
          <span class="icon"><i class="fas fa-envelope"></i></span>
          <p>akrambenaoun1993&#64;gmail.com</p>
        </div>
        <div class="contact-card">
          <span class="icon"><i class="fas fa-map-marker-alt"></i></span>
          <p>Tunisia</p>
        </div>
        <div class="contact-card">
          <span class="icon"><i class="fab fa-linkedin"></i></span>
          <a href="https://linkedin.com/in/akram-ben-aoun-638b77194" target="_blank" rel="noopener noreferrer">
            Akram Benaoun
          </a>
        </div>
      </div>
    </div>

    <form [formGroup]="contactForm" class="contact-form" (ngSubmit)="sendEmail()">

      <div class="name-fields">
        <label>
          <span class="label-text">First Name <span class="required">*</span></span>
          <input type="text" formControlName="firstName" placeholder="First Name" />
          <span *ngIf="contactForm.get('firstName')?.touched && contactForm.get('firstName')?.invalid" class="error">
            First Name is required (min 2 chars)
          </span>
        </label>
        <label>
          <span class="label-text">Last Name <span class="required">*</span></span>
          <input type="text" formControlName="lastName" placeholder="Last Name" />
          <span *ngIf="contactForm.get('lastName')?.touched && contactForm.get('lastName')?.invalid" class="error">
            Last Name is required (min 2 chars)
          </span>
        </label>
      </div>

      <label>
        <span class="label-text">Subject <span class="required">*</span></span>
        <input type="text" formControlName="subject" placeholder="Subject" />
        <span *ngIf="contactForm.get('subject')?.touched && contactForm.get('subject')?.invalid" class="error">
          Subject is required (max 100 chars)
        </span>
      </label>

      <label>
        <span class="label-text">Email <span class="required">*</span></span>
        <input type="email" formControlName="email" placeholder="Email" />
        <span *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid" class="error">
          Valid Email is required
        </span>
      </label>

      <label>
        <span class="label-text">Message <span class="required">*</span></span>
        <textarea formControlName="message" placeholder="Message" rows="6"></textarea>
        <span *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.invalid" class="error">
          Message is required (min 10 chars)
        </span>
      </label>

      <button mat-raised-button color="primary" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send Message' }}
      </button>

    </form>

    <div class="loading-overlay" *ngIf="isLoading">
      <div class="spinner"></div>
    </div>

  </div>
</section>

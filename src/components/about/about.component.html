<div id="about" class="min-h-screen bg-black flex items-center px-6 py-16 sm:py-20 relative overflow-hidden">

  <div class="max-w-7xl w-full mx-auto grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">

    <div class="flex flex-col items-center lg:items-start space-y-6 lg:space-y-12">

      <div class="w-48 sm:w-56 lg:w-[420px] flex flex-col items-center lg:items-start opacity-0 animate-content-fade">
        <div
          class="w-full bg-white/10 text-white rounded-xl px-4 py-2 text-xs sm:text-sm shadow-lg backdrop-blur-xl border border-white/20 flex flex-col items-center gap-1">
          <div class="flex items-center gap-2">
            <ng-container *ngIf="isDaytime; else nightIcon">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5 text-yellow-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 3v1m0 16v1m8.66-8.66l.7.7M3.64 3.64l.7.7M21 12h1M2 12H1m16.66 4.66l.7.7M4.34 4.34l.7.7M12 5a7 7 0 100 14 7 7 0 000-14z" />
              </svg>
            </ng-container>
            <ng-template #nightIcon>
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5 text-blue-300" fill="currentColor" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" />
              </svg>
            </ng-template>
            <span class="font-semibold text-xs sm:text-sm">{{ currentTime }}</span>
          </div>
          <span class="text-gray-300 text-[10px] sm:text-xs">{{ currentDate }}</span>
          <span class="text-gray-500 text-[9px] sm:text-xs">{{ timeZone }}</span>
        </div>
      </div>

      <div class="w-52 sm:w-64 lg:w-[420px] aspect-square relative opacity-0 animate-content-fade delay-150">
        <div id="image-skeleton" class="absolute inset-0 w-full h-full bg-gray-700 rounded-full animate-pulse"></div>
        <img src="assets/profile_picture.png" alt="Profile"
          class="w-full h-full object-cover rounded-full border-4 border-gray-600 shadow-2xl opacity-0 transition-opacity duration-500"
          onload="
            document.getElementById('image-skeleton').style.display='none';
            this.style.opacity='1';
          " />
      </div>
    </div>

    <div class="text-center lg:text-left flex flex-col items-center lg:items-start space-y-4 sm:space-y-6">

      <h1 id="about-title"
        class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white opacity-0 animate-content-fade delay-300">
        AKRAM BENAOUN
      </h1>

      <h2 id="about-subtitle"
        class="text-lg sm:text-xl md:text-2xl text-gray-400 mt-2 mb-4 sm:mb-6 opacity-0 animate-content-fade delay-450">
        <span class="typing-subtitle"></span>
      </h2>

      <p id="about-text"
        class="text-gray-300 text-base sm:text-lg md:text-xl leading-relaxed max-w-xs sm:max-w-lg md:max-w-xl mx-auto lg:mx-0 opacity-0 animate-content-fade delay-600">
        A passionate Full-Stack Web & Mobile Applications Developer specializing
        in MERN & MEAN stacks. I design and build scalable, high-performance
        applications with clean architecture and exceptional user experiences.
      </p>

      <button (click)="scrollToContact()"
        class="mt-6 sm:mt-8 bg-white text-black px-6 sm:px-8 py-3 sm:py-4 text-base sm:text-lg font-semibold rounded-lg hover:bg-gray-200 transition shadow-lg opacity-0 animate-content-fade delay-750">
        Hire Me
      </button>

    </div>
  </div>
</div>
